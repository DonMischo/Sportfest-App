name: Build & Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller pillow

      - name: Generate icon
        run: python assets/make_icon.py

      - name: Build React frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend build into backend/static
        run: |
          if (Test-Path backend/static) { Remove-Item -Recurse -Force backend/static }
          Copy-Item -Recurse frontend/dist backend/static

      - name: Build Python backend (onedir via spec)
        run: |
          pyinstaller backend/sportfest.spec `
            --distpath api-dist `
            --workpath build_tmp `
            --noconfirm

      - name: Install Electron dependencies
        run: npm ci

      - name: Build Electron installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win -- --publish always

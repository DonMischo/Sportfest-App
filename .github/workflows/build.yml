name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller pillow

      - name: Generate icon
        run: python assets/make_icon.py

      - name: Install Node dependencies & build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend build into backend/static
        run: |
          if (Test-Path backend/static) { Remove-Item -Recurse -Force backend/static }
          Copy-Item -Recurse frontend/dist backend/static

      - name: Bundle with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --name Sportfest `
            --icon assets/icon.ico `
            --distpath dist `
            --workpath build_tmp `
            --specpath build_tmp `
            --add-data "backend/static;static" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            backend/main.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Sportfest.exe
          generate_release_notes: true
